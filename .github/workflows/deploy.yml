name: Deploy Live to Amazon ECS

on:
  push:
    branches: [ main ]

env:
  ECS_CLUSTER: shared-core-cluster

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Clean App Name
      id: app_name
      run: |
        CLEAN_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        echo "APP_NAME=$CLEAN_NAME" >> $GITHUB_ENV

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create ECR Repository if missing
      run: |
        aws ecr describe-repositories --repository-names ${{ env.APP_NAME }} || \
        aws ecr create-repository --repository-name ${{ env.APP_NAME }}

    - name: Build, Tag, and Push Image to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.APP_NAME }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Register New Task Definition Version
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: app-container
        image: ${{ steps.build-image.outputs.image }}

    # FIXED STEP: Registers the file with AWS first to get a valid identifier
    - name: Create ECS Service if missing
      run: |
        if ! aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.APP_NAME }}-service | grep -q "ACTIVE"; then
          echo "Service is missing. Registering task definition with AWS first..."
          
          # Register task definition file and grab the live ARN string
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }} --query "taskDefinition.taskDefinitionArn" --output text)
          
          echo "Creating ECS service using ARN: $TASK_DEF_ARN"
          aws ecs create-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.APP_NAME }}-service \
            --task-definition $TASK_DEF_ARN \
            --desired-count 1 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.AWS_SUBNETS }}],securityGroups=[${{ vars.AWS_SECURITY_GROUP }}],assignPublicIp=ENABLED}"
        else
          echo "Service already exists. Proceeding to standard rolling deployment."
        fi

    - name: Deploy Task Definition to live ECS Service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: ${{ env.APP_NAME }}-service
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
